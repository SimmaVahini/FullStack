<!DOCTYPE html>
<html>
<head>
    <title>Super Market</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }

        h1 {
            color: green;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .item {
            background-color: white;
            border: 1px solid #ccc;
            padding: 15px;
            width: 150px;
            border-radius: 10px;
        }

        .item img {
            width: 100px;
            height: 100px;
        }

        .price {
            color: red;
            font-weight: bold;
        }
    </style>

</head>

<body>

<h1>Super Market Items</h1>

<div class="container">

    <div class="item">
        <img src="https://via.placeholder.com/100">
        <h3>Apple</h3>
        <p class="price">₹120/kg</p>
    </div>

    <div class="item">
        <img src="https://via.placeholder.com/100">
        <h3>Milk</h3>
        <p class="price">₹50/L</p>
    </div>

    <div class="item">
        <img src="https://via.placeholder.com/100">
        <h3>Bread</h3>
        <p class="price">₹40</p>
    </div>

    <div class="item">
        <img src="https://via.placeholder.com/100">
        <h3>Rice</h3>
        <p class="price">₹60/kg</p>
    </div>

</div>

</body>
</html>
