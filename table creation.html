<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Table Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 60%;
            background-color: white;
        }

        th, td {
            border: 2px solid #444;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        caption {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Student Details Table</h1>

    <table>
        <caption>Student Information</caption>
        
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Department</th>
            <th>Marks</th>
        </tr>

        <tr>
            <td>101</td>
            <td>Arun</td>
            <td>CSE</td>
            <td>85</td>
        </tr>

        <tr>
            <td>102</td>
            <td>Priya</td>
            <td>ECE</td>
            <td>90</td>
        </tr>

        <tr>
            <td>103</td>
            <td>Karthik</td>
            <td>IT</td>
            <td>78</td>
        </tr>

        <tr>
            <td>104</td>
            <td>Sneha</td>
            <td>EEE</td>
            <td>88</td>
        </tr>

    </table>

</body>
</html>
