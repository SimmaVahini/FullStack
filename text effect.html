<!DOCTYPE html>
<html>
<head>
    <title>Text Effects using CSS</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        h1 {
            color: blue;
            text-transform: uppercase;
        }

        .shadow {
            font-size: 25px;
            text-shadow: 2px 2px 5px gray;
        }

        .spacing {
            letter-spacing: 3px;
            word-spacing: 10px;
        }

        .decor {
            text-decoration: underline;
        }

        .transform {
            transform: rotate(10deg);
            display: inline-block;
            margin-top: 20px;
        }

        .capitalize {
            text-transform: capitalize;
        }
    </style>

</head>
<body>

<h1>Text Effects Demo</h1>

<p class="shadow">This text has shadow effect</p>

<p class="spacing">This text has spacing effect</p>

<p class="decor">This text is underlined</p>

<p class="capitalize">this text is capitalized using css</p>

<p class="transform">This text is rotated</p>

</body>
</html>
